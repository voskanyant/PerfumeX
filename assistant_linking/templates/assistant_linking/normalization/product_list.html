{% extends "prices/base.html" %}
{% block title %}Unparsed Products{% endblock %}
{% block content %}<div class="page-head"><div><span class="page-kicker">Normalisation</span><h1 class="page-title">Unparsed supplier rows</h1></div></div><div class="workspace-block"><table class="data-table"><tbody>{% for product in products %}<tr><td>{{ product.supplier }}</td><td>{{ product.name }}</td><td><a class="button ghost" href="{% url 'assistant_linking:normalization_detail' product.pk %}">Open detail</a></td></tr>{% empty %}<tr><td>No unparsed rows.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
