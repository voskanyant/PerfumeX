{% extends "prices/base.html" %}
{% block body_data %}data-page="confirm-delete"{% endblock %}

{% block content %}
<div class="page-stack">
    <section class="card form-shell">
        <span class="page-kicker">Delete</span>
        <h1 class="page-title">Delete {{ object }}</h1>
        <p class="page-subtitle">This action is permanent. Confirm only if you want the record removed.</p>
        <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="form-actions">
                <button class="button danger" type="submit">Confirm delete</button>
                <a class="button ghost" href="javascript:history.back()">Cancel</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
