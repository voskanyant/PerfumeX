name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          debug: true
          command_timeout: 30m
          script: |
            set -e
            echo "User: $(whoami)"
            echo "Host: $(hostname)"
            cd /opt/perfumex/PerfumeX
            pwd
            git pull origin main
            /opt/perfumex/PerfumeX/.venv/bin/pip install -r requirements.txt
            while IFS='=' read -r key value || [ -n "$key" ]; do
              key="${key%%[[:space:]]*}"
              case "$key" in
                ''|\#*) continue ;;
              esac
              case "$key" in
                [A-Za-z_][A-Za-z0-9_]*)
                  value="$(printf '%s' "$value" | tr -d '\r')"
                  export "$key=$value"
                  ;;
              esac
            done < /opt/perfumex/PerfumeX/.env
            if [ -z "${FERNET_KEYS:-}" ] && [ -z "${SALT_KEY:-}" ]; then
              if [ -z "${SECRET_KEY:-}" ]; then
                echo "SECRET_KEY is required before deriving FERNET_KEYS"
                exit 1
              fi
              umask 077
              FERNET_KEYS="$(printf '%s' "$SECRET_KEY" | sha256sum | awk '{print $1}')"
              printf '\nFERNET_KEYS=%s\n' "$FERNET_KEYS" >> /opt/perfumex/PerfumeX/.env
              export FERNET_KEYS
            elif [ -z "${FERNET_KEYS:-}" ]; then
              export FERNET_KEYS="$SALT_KEY"
            fi
            /opt/perfumex/PerfumeX/.venv/bin/python manage.py migrate
            /opt/perfumex/PerfumeX/.venv/bin/python manage.py collectstatic --noinput
            systemctl restart perfumex
            systemctl restart nginx
