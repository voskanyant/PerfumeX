name: CI and Deploy

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.13"
  DATABASE_ENGINE: postgres
  POSTGRES_HOST: 127.0.0.1
  POSTGRES_PORT: "5432"
  POSTGRES_DB: perfumex_ci
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  SECRET_KEY: ci-only-not-secret-8f6a90e4d2b64782a4d4c3b2452dd6d7f7e83bb164f24c86
  FERNET_KEYS: ci-only-fernet-key-8f6a90e4d2b64782a4d4c3b2452dd6d7
  DEBUG: "0"
  ALLOWED_HOSTS: 127.0.0.1,localhost
  CSRF_TRUSTED_ORIGINS: https://127.0.0.1,https://localhost
  ASSISTANT_USE_OPENAI: "false"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: npm install
      - run: ruff check .
      - run: npx eslint prices/static/prices/js

  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: perfumex_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py migrate --plan

  test:
    runs-on: ubuntu-latest
    env:
      DEBUG: "1"
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: perfumex_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: coverage run manage.py test --verbosity=2
      - run: coverage report --fail-under=30

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pip-audit --strict -r requirements.txt
      - run: python manage.py check --deploy
      - run: bandit -r prices assistant_core assistant_linking catalog --severity-level high --exclude "*/tests.py,*/tests/*"

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, migrations, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          debug: true
          command_timeout: 30m
          script: |
            set -e
            echo "User: $(whoami)"
            echo "Host: $(hostname)"
            cd /opt/perfumex/PerfumeX
            pwd
            git pull origin main
            /opt/perfumex/PerfumeX/.venv/bin/pip install -r requirements.txt
            while IFS='=' read -r key value || [ -n "$key" ]; do
              key="${key%%[[:space:]]*}"
              case "$key" in
                ''|\#*) continue ;;
              esac
              case "$key" in
                [A-Za-z_][A-Za-z0-9_]*)
                  value="$(printf '%s' "$value" | tr -d '\r' | sed -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
                  export "$key=$value"
                  ;;
              esac
            done < /opt/perfumex/PerfumeX/.env
            if [ -z "${FERNET_KEYS:-}" ] && [ -z "${SALT_KEY:-}" ]; then
              if [ -z "${SECRET_KEY:-}" ]; then
                echo "SECRET_KEY is required before deriving FERNET_KEYS"
                exit 1
              fi
              umask 077
              FERNET_KEYS="$(printf '%s' "$SECRET_KEY" | sha256sum | awk '{print $1}')"
              printf '\nFERNET_KEYS=%s\n' "$FERNET_KEYS" >> /opt/perfumex/PerfumeX/.env
              export FERNET_KEYS
            elif [ -z "${FERNET_KEYS:-}" ]; then
              export FERNET_KEYS="$SALT_KEY"
            fi
            /opt/perfumex/PerfumeX/.venv/bin/python manage.py migrate
            /opt/perfumex/PerfumeX/.venv/bin/python manage.py collectstatic --noinput
            systemctl restart perfumex
            systemctl restart nginx
