{% extends "prices/base.html" %}
{% block title %}Research Jobs{% endblock %}
{% block content %}<div class="page-head"><div><span class="page-kicker">Assistant</span><h1 class="page-title">Research jobs</h1></div></div><div class="workspace-block"><table class="data-table"><tbody>{% for job in jobs %}<tr><td><a href="{% url 'assistant_core:research_job_detail' job.pk %}">{{ job.job_type }}</a></td><td>{{ job.status }}</td><td>{{ job.result_summary }}</td><td>{{ job.created_at }}</td></tr>{% empty %}<tr><td>No jobs.</td></tr>{% endfor %}</tbody></table></div>{% endblock %}
